# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# The following keys must be escaped otherwise they will not be retrieved by
# the default I18n backend:
#
# true, false, on, off, yes, no
#
# Instead, surround them with single quotes.
#
# en:
#   "true": "foo"
#
# To learn more, please read the Rails Internationalization guide
# available at https://guides.rubyonrails.org/i18n.html.

en:
  hello: "Hello world"
  # Plage de dates d'une réservation (BookingDecorator#date_range) — issue #15.
  date_range:
    same_month_current_year: "from %{from_day} to %{to}"
    same_month_other_year: "from %{from_day} to %{to_day} %{month_year}"
    same_year: "from %{from} to %{to_day} %{to_month_year}"
    different_years: "from %{from_day} %{from_month_year} to %{to_day} %{to_month_year}"
  # `date_range` s'appuie sur les formats `short` et `month_year` : le `month_year`
  # n'existe pas dans les défauts Rails, et le `short` par défaut ("%b %d") donnerait
  # « Jul 5 » au milieu d'une phrase « from 3 to Jul 5 ». On les fixe ici.
  date:
    formats:
      short: "%e %B"
      month_year: "%B %Y"
  number:
    currency:
      format:
        delimiter: ","
        format: "%u%n"
        precision: 2
        separator: "."
        unit: "€"
