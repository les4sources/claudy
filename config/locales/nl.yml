# Formats de date/heure néerlandais (issue #15). Les traductions de contenu des
# pages client vivent dans public.*.nl.yml (Phase 2) ; ici, uniquement ce qu'il
# faut à `l()` pour ne pas casser quand la locale est :nl.
nl:
  # Plage de dates d'une réservation (BookingDecorator#date_range) — issue #15.
  date_range:
    same_month_current_year: "van %{from_day} tot %{to}"
    same_month_other_year: "van %{from_day} tot %{to_day} %{month_year}"
    same_year: "van %{from} tot %{to_day} %{to_month_year}"
    different_years: "van %{from_day} %{from_month_year} tot %{to_day} %{to_month_year}"
  number:
    currency:
      format:
        delimiter: "."
        format: "%u %n"
        precision: 2
        separator: ","
        unit: "€"
  date:
    abbr_day_names:
    - zo
    - ma
    - di
    - wo
    - do
    - vr
    - za
    abbr_month_names:
    -
    - jan
    - feb
    - mrt
    - apr
    - mei
    - jun
    - jul
    - aug
    - sep
    - okt
    - nov
    - dec
    day_names:
    - zondag
    - maandag
    - dinsdag
    - woensdag
    - donderdag
    - vrijdag
    - zaterdag
    formats:
      default: "%d-%m-%Y"
      long: "%e %B %Y"
      short: "%e %b"
      month_year: "%B %Y"
    month_names:
    -
    - januari
    - februari
    - maart
    - april
    - mei
    - juni
    - juli
    - augustus
    - september
    - oktober
    - november
    - december
    order:
    - :day
    - :month
    - :year
  time:
    am: "'s ochtends"
    formats:
      default: "%a %d %b %Y %H:%M:%S %z"
      long: "%d %B %Y %H:%M"
      short: "%d %b %H:%M"
    pm: "'s middags"
