          description: Chambre.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Room" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /spaces:
    get:
      tags: [Catalogue]
      summary: Lister les espaces
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PerPage" }]
      responses:
        "200":
          description: Liste paginée d'espaces.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Space" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /spaces/{id}:
    patch:
      tags: [Catalogue]
      summary: Éditer un espace
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Espace mis à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Space" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Catalogue]
      summary: Supprimer un espace (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [Catalogue]
      summary: Détail d'un espace
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Espace.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Space" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /humans:
    get:
      tags: [Collectif]
      summary: Lister les membres
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PerPage" }]
      responses:
        "200":
          description: Liste paginée de membres.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Human" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /humans/{id}:
    patch:
      tags: [Collectif]
      summary: Éditer un membre
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Membre mis à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Human" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Collectif]
      summary: Supprimer un membre (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [Collectif]
      summary: Détail d'un membre
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Membre.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Human" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /cycles:
    get:
      tags: [Collectif]
      summary: Lister les cycles
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PerPage" }]
      responses:
        "200":
          description: Liste paginée de cycles.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Cycle" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /cycles/{id}:
    patch:
      tags: [Collectif]
      summary: Éditer un cycle
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Cycle mis à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Cycle" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Collectif]
      summary: Supprimer un cycle (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [Collectif]
      summary: Détail d'un cycle
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Cycle.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Cycle" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /cycle_actions:
    get:
      tags: [Collectif]
      summary: Lister les actions de cycle
      parameters:
        - { name: human_id, in: query, schema: { type: integer }, description: "Filtre par membre responsable." }
        - { name: category, in: query, schema: { type: string, enum: [rituelle, ponctuelle, reportee, deleguee, demandee, invitee] } }
        - { name: completed, in: query, schema: { type: boolean }, description: "Filtre par état d'achèvement." }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PerPage" }
      responses:
        "200":
          description: Liste paginée d'actions de cycle.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/CycleAction" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /cycle_actions/{id}:
    patch:
      tags: [Collectif]
      summary: Éditer une action de cycle
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Action de cycle mise à jour.
          content:
