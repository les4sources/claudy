openapi: 3.0.3
info:
  title: Claudy API
  version: "1.0.0"
  description: >
    API privée du Domaine d'Ahinvaux (Les 4 Sources, Yvoir).
    Conçue pour qu'un agent IA puisse consulter les réservations, les disponibilités,
    le catalogue (logements, chambres, espaces), la vie du collectif et les paiements,
    et éditer (PATCH) ou supprimer (DELETE, suppression douce) chaque ressource.
    Toutes les routes exigent un jeton Bearer fourni hors-bande.
    Pour une écriture, encapsuler le corps JSON sous la clé racine de la ressource
    (ex. PATCH /bookings/1 avec { "booking": { "status": "confirmed" } }).
    La création (POST) n'est pas exposée.
servers:
  - url: /api/v1
    description: Chemin relatif. Préfixer avec l'origine de l'instance (ex. https://claudy.example.com/api/v1).
security:
  - bearerAuth: []
tags:
  - name: Discovery
    description: Découverte et documentation de l'API.
  - name: Réservations
    description: Séjours en logement, réservations d'espaces et disponibilités.
  - name: Catalogue
    description: Logements, chambres et espaces — données de référence.
  - name: Collectif
    description: Membres, cycles, actions de cycle et tâches de l'organisation.
  - name: Finances
    description: Paiements liés aux réservations.
  - name: Clients
    description: Clients (particuliers et organisations) et leurs séjours.

paths:
  /:
    get:
      tags: [Discovery]
      summary: Index de l'API
      description: Retourne un descriptif JSON des ressources disponibles, des conventions et un lien vers cette spec. Point de départ recommandé pour un agent.
      responses:
        "200":
          description: Descriptif de l'API.
        "401": { $ref: "#/components/responses/Unauthorized" }
  /openapi:
    get:
      tags: [Discovery]
      summary: Spécification OpenAPI
      description: Retourne cette spécification OpenAPI 3 au format JSON.
      responses:
        "200":
          description: Document OpenAPI.
        "401": { $ref: "#/components/responses/Unauthorized" }

  /customers:
    get:
      tags: [Clients]
      summary: Lister les clients
      description: Clients (particuliers et organisations) du domaine.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "Recherche plein-texte (nom, email…)." }
        - { name: customer_type, in: query, schema: { type: string, enum: [individual, organization] } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PerPage" }
      responses:
        "200":
          description: Liste paginée de clients.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Customer" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /customers/{id}:
    get:
      tags: [Clients]
      summary: Détail d'un client
      description: Inclut les séjours du client. Les notes internes ne sont jamais exposées (§11.7).
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Client.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Customer" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Clients]
      summary: Éditer un client
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Client mis à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Customer" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Clients]
      summary: Supprimer un client (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /stays:
    get:
      tags: [Réservations]
      summary: Lister les séjours
      description: Séjours regroupant les items réservés (logements/espaces) d'un client.
      parameters:
        - { name: customer_id, in: query, schema: { type: integer }, description: "Filtre par client." }
        - { name: status, in: query, schema: { type: string }, description: "Filtre par statut." }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PerPage" }
      responses:
        "200":
          description: Liste paginée de séjours.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Stay" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /stays/{id}:
    get:
      tags: [Réservations]
      summary: Détail d'un séjour
      description: Inclut les items du séjour et leurs types concrets.
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Séjour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Stay" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Réservations]
      summary: Éditer un séjour
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Séjour mis à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Stay" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Réservations]
      summary: Supprimer un séjour (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /bookings:
    get:
      tags: [Réservations]
      summary: Lister les réservations de séjour
      description: >
        Réservations de logement. Trie par date. À utiliser pour répondre à
        « qui vient », « quelles arrivées cette semaine », « réservations confirmées sur juillet ».
      parameters:
        - { name: from_date, in: query, schema: { type: string, format: date }, description: "Ne renvoie que les séjours dont to_date >= from_date." }
        - { name: to_date, in: query, schema: { type: string, format: date }, description: "Ne renvoie que les séjours dont from_date <= to_date." }
        - { name: status, in: query, schema: { type: string, enum: [pending, confirmed, declined, canceled] }, description: "Filtre par statut." }
        - { name: lodging_id, in: query, schema: { type: integer }, description: "Filtre par hébergement." }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PerPage" }
      responses:
        "200":
          description: Liste paginée de réservations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Booking" } }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /bookings/{id}:
    patch:
      tags: [Réservations]
      summary: Éditer une réservation de séjour
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/WriteBody" }
      responses:
        "200":
          description: Réservation mise à jour.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Booking" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
    delete:
      tags: [Réservations]
      summary: Supprimer une réservation de séjour (soft-delete)
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [Réservations]
      summary: Détail d'une réservation de séjour
      description: Inclut le détail jour par jour des chambres réservées et les notes internes.
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Réservation.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: "#/components/schemas/Booking" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /space_bookings:
    get:
      tags: [Réservations]
      summary: Lister les réservations d'espaces
      parameters:
        - { name: from_date, in: query, schema: { type: string, format: date } }
        - { name: to_date, in: query, schema: { type: string, format: date } }
        - { name: status, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PerPage" }
      responses:
        "200":
          description: Liste paginée de réservations d'espaces.
          content:
