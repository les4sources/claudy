        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Jeton statique partagé, transmis en header `Authorization: Bearer <token>`."
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1 }
      description: Numéro de page (pagination).
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, default: 50, maximum: 200 }
      description: Éléments par page (max 200).
  responses:
    Unauthorized:
      description: Jeton manquant ou invalide.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Ressource introuvable.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unprocessable:
      description: Paramètres invalides.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NoContent:
      description: Suppression effectuée (soft-delete). Pas de corps de réponse.
  requestBodies:
    WriteBody:
      required: true
      description: >
        Champs à modifier, encapsulés sous la clé racine de la ressource
        (ex. { "booking": { "status": "confirmed" } }). Seuls les champs éditables
        sont pris en compte ; id, type et champs calculés sont ignorés. Voir le schéma
        de lecture de la ressource pour la liste des champs.
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: object
              additionalProperties: true
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
    Money:
      type: object
      properties:
        cents: { type: integer, nullable: true, description: "Montant en centimes." }
        currency: { type: string, example: "EUR" }
        formatted: { type: string, nullable: true, example: "1.250,00 €" }
    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        pages: { type: integer }
    Ref:
      type: object
      description: Référence légère vers une autre ressource.
      properties:
        id: { type: integer }
        name: { type: string }
    Customer:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, example: "customer" }
        customer_type: { type: string, enum: [individual, organization] }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        organization_name: { type: string, nullable: true }
        name: { type: string, description: "Nom d'affichage calculé." }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        language: { type: string, example: "fr" }
        vat_number: { type: string, nullable: true }
        peppol_id: { type: string, nullable: true }
        address:
          type: object
          properties:
            line: { type: string, nullable: true }
            zip: { type: string, nullable: true }
            city: { type: string, nullable: true }
            country: { type: string, nullable: true }
        marketing_consent: { type: boolean }
        nps_eligible: { type: boolean }
        stripe_customer_id: { type: string, nullable: true }
        human: { allOf: [{ $ref: "#/components/schemas/Ref" }], nullable: true }
        stays:
          type: array
          description: "Séjours du client (détail uniquement)."
          items: { $ref: "#/components/schemas/Stay" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        url: { type: string, format: uri }
    Stay:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, example: "stay" }
        status: { type: string, nullable: true }
        arrival_date: { type: string, format: date, nullable: true }
        departure_date: { type: string, format: date, nullable: true }
        total_amount: { $ref: "#/components/schemas/Money" }
        legacy_origin: { type: string, nullable: true }
        customer:
          type: object
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              bookable_type: { type: string }
              bookable_id: { type: integer }
              from_date: { type: string, format: date, nullable: true }
              to_date: { type: string, format: date, nullable: true }
              status: { type: string, nullable: true }
        items_count: { type: integer, description: "Détail uniquement." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        url: { type: string, format: uri }
    Booking:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, example: "booking" }
        group_name: { type: string, nullable: true }
        firstname: { type: string, nullable: true }
        lastname: { type: string, nullable: true }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        from_date: { type: string, format: date }
        to_date: { type: string, format: date }
        nights_count: { type: integer }
        status: { type: string, nullable: true }
        payment_status: { type: string, nullable: true }
        invoice_status: { type: string, nullable: true }
        contract_status: { type: string, nullable: true }
        adults: { type: integer, nullable: true }
        children: { type: integer, nullable: true }
        babies: { type: integer, nullable: true }
        beds_count: { type: integer }
        tier: { type: string, nullable: true }
        platform: { type: string, nullable: true }
        estimated_arrival: { type: string, nullable: true }
        departure_time: { type: string, nullable: true }
        lodging: { allOf: [{ $ref: "#/components/schemas/Ref" }], nullable: true }
        price: { $ref: "#/components/schemas/Money" }
        options:
