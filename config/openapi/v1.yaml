        token: { type: string, description: "Jeton d'accès public à la fiche réservation." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        url: { type: string }
        notes: { type: string, nullable: true, description: "Présent uniquement sur le détail." }
